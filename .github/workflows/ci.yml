name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install fastapi uvicorn[standard] passlib[bcrypt]

      - name: Run tests
        run: |
          python tests/test_inspector_snapshot.py
          python tests/test_updater_pruner.py
          python tests/test_drift.py
          python tests/test_tui.py
          python tests/test_daemon.py
          python tests/test_exporter_importer_deprecation.py

      - name: Import smoke test
        run: |
          python -c "
          from dam.platform.detector import detect_platform
          from dam.core.inspector import ContainerConfig
          from dam.core.snapshot import SnapshotManager
          from dam.core.updater import Updater, UpdateStatus
          from dam.core.pruner import Pruner
          from dam.core.drift import DriftDetector
          from dam.daemon.scheduler import parse_cron, validate_cron
          from dam.daemon.service import DaemonManager, DaemonState
          from dam.web.server import create_app
          from dam.core.exporter import Exporter
          from dam.core.importer import Importer
          from dam.core.deprecation import DeprecationChecker
          print('All imports OK')
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install flake8

      - name: Flake8
        run: flake8 dam/ --max-line-length=120
